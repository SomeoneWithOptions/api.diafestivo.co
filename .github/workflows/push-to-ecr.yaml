name: Build and Push to AWS ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check go fix diff
        run: |
          go fix -diff ./... > /tmp/go-fix.diff
          if [ -s /tmp/go-fix.diff ]; then
            cat /tmp/go-fix.diff
            exit 1
          fi

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck_bin="$(go env GOBIN)/staticcheck"
          if [ "$(go env GOBIN)" = "" ]; then
            staticcheck_bin="$(go env GOPATH)/bin/staticcheck"
          fi
          "$staticcheck_bin" ./...

  build-and-push-arm64:
    runs-on: ubuntu-24.04-arm
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::745912973548:role/githubactions-role
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push for arm64
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: api-diafestivo
          IMAGE_TAG: ${{ github.sha }}
          ARCH: "arm64"
        run: |
          docker build --platform linux/${ARCH} -t $REGISTRY/$REPOSITORY:${IMAGE_TAG}-${ARCH} .
          docker tag $REGISTRY/$REPOSITORY:${IMAGE_TAG}-${ARCH} $REGISTRY/$REPOSITORY:${ARCH}
          docker push $REGISTRY/$REPOSITORY:${IMAGE_TAG}-${ARCH}
          docker push $REGISTRY/$REPOSITORY:${ARCH}

  build-and-push-latest:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::745912973548:role/githubactions-role
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push latest tag
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: api-diafestivo
          IMAGE_TAG: ${{ github.sha }}
          ARCH: "amd64"
        run: |
          docker build --platform linux/${ARCH} -t $REGISTRY/$REPOSITORY:${IMAGE_TAG}-${ARCH} .
          docker tag $REGISTRY/$REPOSITORY:${IMAGE_TAG}-${ARCH} $REGISTRY/$REPOSITORY:${ARCH}
          docker tag $REGISTRY/$REPOSITORY:${IMAGE_TAG}-${ARCH} $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:${IMAGE_TAG}-${ARCH}
          docker push $REGISTRY/$REPOSITORY:${ARCH}
          docker push $REGISTRY/$REPOSITORY:latest
